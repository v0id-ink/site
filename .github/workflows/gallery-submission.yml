name: Gallery Submission

on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  process-submission:
    # 仅处理带 gallery-submission 标签的 Issue
    # opened：模板自动带标签；labeled：事后补标签也能触发
    if: contains(github.event.issue.labels.*.name, 'gallery-submission')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Process submission
        id: process
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
        run: node .github/scripts/process-gallery-submission.mjs

      - name: Create Pull Request
        if: steps.process.outputs.has-images == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          branch="gallery-submission-${ISSUE_NUMBER}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add public/images/ settings.json
          git commit -m "Add gallery images from #${ISSUE_NUMBER}"
          git push origin "$branch"
          gh pr create \
            --title "Add gallery images from #${ISSUE_NUMBER}" \
            --body-file pr-body.md \
            --head "$branch" \
            --base "${{ github.event.repository.default_branch }}" \
            --label "gallery-submission"
